name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict Sources/

  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache GhosttyKit xcframework
        id: cache-ghostty
        uses: actions/cache@v4
        with:
          path: ghostty/macos/GhosttyKit.xcframework
          key: ghosttykit-${{ hashFiles('.gitmodules', 'ghostty') }}

      - name: Build GhosttyKit
        if: steps.cache-ghostty.outputs.cache-hit != 'true'
        working-directory: ghostty
        run: zig build -Demit-xcframework -Dxcframework-target=native -Doptimize=ReleaseFast

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build Deckard
        run: |
          xcodebuild -project Deckard.xcodeproj \
            -scheme Deckard \
            -configuration Debug \
            -destination 'platform=macOS' \
            build
