name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build GhosttyKit
        working-directory: ghostty
        run: zig build -Demit-xcframework -Dxcframework-target=native -Doptimize=ReleaseFast

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Deckard
        run: |
          xcodebuild -project Deckard.xcodeproj \
            -scheme Deckard \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            build

      - name: Ad-hoc codesign
        run: codesign -s - --force --deep build/Build/Products/Release/Deckard.app

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Deckard" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Deckard.app" 150 190 \
            --app-drop-link 450 190 \
            "Deckard-${{ steps.version.outputs.version }}.dmg" \
            build/Build/Products/Release/Deckard.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Deckard-*.dmg
          generate_release_notes: true
